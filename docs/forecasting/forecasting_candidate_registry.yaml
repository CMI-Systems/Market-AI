schema_version: "1.0"
registry_name: "Market AI Forecasting Candidate Registry"
last_reviewed: "2026-07-16"
human_readable_authority: "FORECASTING_CANDIDATE_REGISTRY.md"
derivative_only: true
governance_authority: false
constitutional_baseline: "Phase R.5.3 - Ratified"
phase_s_status: "definition-only, unapproved, and unimplemented"
training_status: "off"
shadow_trainer_status: "off"
brain_learning_status: "off"
autonomous_learning_status: "off"
production_status: "untouched"

authority_disclaimers:
  - "Registration is not approval."
  - "Selection for a proof of concept is not Certification."
  - "Benchmark success is not Promotion."
  - "Local inference is not production authorization."
  - "A license entry is not legal advice."
  - "All licenses must be reverified before implementation and release."

constitutional_scope:
  market_ai_owns:
    - reasoning
    - intelligence_orchestration
    - forecasting_research_for_market_intelligence_generation
    - model_adapter_and_benchmark_planning
  ai_database_retains:
    - dataset_governance
    - provenance_and_lineage
    - certified_datasets
    - dataset_eligibility
    - certification_and_promotion_governance
    - model_and_training_metadata_governance
  embedded_ai_training_system_retains:
    - governed_training
    - governed_evaluation
    - certification_preparation
    - promotion_preparation
  cmi_systems_llc_retains:
    - operational_authorization
    - production_authorization
    - release_authority
    - security_authority

controlled_statuses:
  selected_for_staging_poc: "Selected only for a bounded staging proof-of-concept proposal; implementation still requires authorization."
  registered: "Recorded for governed comparison with no implementation authorization."
  deferred: "Preserved for later sequencing after prerequisites or higher-priority work."
  watchlist: "Monitored for future reassessment with no current implementation plan."
  research_only: "Restricted to non-production research consideration."
  excluded_noncommercial: "Excluded from commercial and production-bound work because of license restrictions."
  blocked_pending_authorization: "Blocked until the named governance authorization is granted."
  implemented_unverified: "Code may exist, but required verification and governance gates have not passed."
  benchmarked: "Controlled benchmark evidence exists; this is not Certification, Promotion, or Operational Authorization."
  rejected: "Evaluated and rejected with the reason preserved."
  retired: "Previously active registry entry removed from further consideration while history is retained."

prohibited_initial_statuses:
  - production_approved
  - certified
  - promoted
  - operationally_authorized

global_authorizations:
  implementation_authorized: false
  training_authorized: false
  production_authorized: false

entry_schema:
  required_fields:
    - registry_id
    - display_name
    - provider
    - category
    - component_type
    - upstream_artifact_id
    - package_or_repository
    - official_source_urls
    - license
    - license_verification_date
    - commercial_eligibility
    - execution_mode
    - training_required
    - zero_shot_supported
    - point_forecast_supported
    - probabilistic_output
    - native_quantile_support
    - multivariate_support
    - past_covariate_support
    - future_covariate_support
    - exogenous_variable_support
    - cpu_support
    - gpu_support
    - expected_context_constraints
    - initial_forecast_horizon
    - dependency_group
    - planned_adapter
    - implementation_priority
    - registry_status
    - implementation_authorized
    - training_authorized
    - production_authorized
    - known_constraints
    - evaluation_requirements
    - source_reverification_required
    - notes

source_sets:
  chronos: &chronos_sources
    - "https://huggingface.co/amazon/chronos-2"
    - "https://github.com/amazon-science/chronos-forecasting"
  timesfm: &timesfm_sources
    - "https://huggingface.co/google/timesfm-2.5-200m-pytorch"
    - "https://github.com/google-research/timesfm"
  granite_r3: &granite_r3_sources
    - "https://huggingface.co/ibm-granite/granite-timeseries-ttm-r3"
    - "https://github.com/ibm-granite/granite-tsfm"
  granite_r2: &granite_r2_sources
    - "https://huggingface.co/ibm-granite/granite-timeseries-ttm-r2"
    - "https://github.com/ibm-granite/granite-tsfm"
  timegpt: &timegpt_sources
    - "https://www.nixtla.io/docs/introduction/about_timegpt"
    - "https://www.nixtla.io/docs/forecasting/timegpt_2_family"
    - "https://www.nixtla.io/docs/reference/sdk_reference"
    - "https://www.nixtla.io/industries/financial-markets"
    - "https://www.nixtla.io/docs/about/privacy-notice"
    - "https://www.nixtla.io/docs/about/terms-and-conditions"
    - "https://www.nixtla.io/blog/timegpt-2-announcement"
    - "https://www.nixtla.io/blog/timegpt-2-1-announcement"
    - "https://www.nixtla.io/genai-waitlist"
  statsforecast: &statsforecast_sources
    - "https://github.com/Nixtla/statsforecast"
    - "https://nixtlaverse.nixtla.io/statsforecast/"
  neuralforecast: &neuralforecast_sources
    - "https://github.com/Nixtla/neuralforecast"
    - "https://nixtlaverse.nixtla.io/neuralforecast/"
  hierarchicalforecast: &hierarchicalforecast_sources
    - "https://github.com/Nixtla/hierarchicalforecast"
    - "https://nixtlaverse.nixtla.io/hierarchicalforecast/"
  moirai: &moirai_sources
    - "https://huggingface.co/Salesforce/moirai-2.0-R-small"
    - "https://github.com/SalesforceAIResearch/uni2ts"
  lag_llama: &lag_llama_sources
    - "https://huggingface.co/time-series-foundation-models/Lag-Llama"
    - "https://github.com/time-series-foundation-models/lag-llama"

entry_templates:
  external: &external_entry
    provider: unknown
    category: unknown
    component_type: unknown
    upstream_artifact_id: null
    package_or_repository: null
    official_source_urls: []
    license: requires_verification
    license_verification_date: "2026-07-16"
    commercial_eligibility: requires_verification
    execution_mode:
      - research_planning_only
    training_required: unknown
    zero_shot_supported: unknown
    point_forecast_supported: unknown
    probabilistic_output: unknown
    native_quantile_support: unknown
    multivariate_support: unknown
    past_covariate_support: unknown
    future_covariate_support: unknown
    exogenous_variable_support: unknown
    cpu_support: unknown
    gpu_support: unknown
    expected_context_constraints:
      - requires_verification
    initial_forecast_horizon: requires_verification
    dependency_group: unknown
    planned_adapter: unknown
    implementation_priority: "none"
    registry_status: registered
    implementation_authorized: false
    training_authorized: false
    production_authorized: false
    known_constraints:
      - "Capability, package, checkpoint, and license details must be reverified before implementation."
    evaluation_requirements:
      - "Use controlled walk-forward evaluation where forecasting is performed."
      - "Compare against naive and conventional baselines where applicable."
    source_reverification_required: true
    notes: []
  internal: &internal_entry
    <<: *external_entry
    provider: "Market AI Research"
    license: not_applicable
    commercial_eligibility: not_applicable
    source_reverification_required: true
  stats_model: &stats_model_entry
    <<: *external_entry
    provider: Nixtla
    category: statistical_baselines
    component_type: statistical_model
    package_or_repository: statsforecast
    official_source_urls: *statsforecast_sources
    license: apache-2.0
    commercial_eligibility: eligible_subject_to_reverification
    execution_mode:
      - local_cpu
    training_required: false
    zero_shot_supported: not_applicable
    point_forecast_supported: true
    probabilistic_output: true
    native_quantile_support: false
    multivariate_support: false
    past_covariate_support: requires_verification
    future_covariate_support: requires_verification
    exogenous_variable_support: requires_verification
    cpu_support: true
    gpu_support: not_applicable
    expected_context_constraints:
      - "Minimum history and seasonality configuration must be valid for the selected method."
    initial_forecast_horizon: "5_periods"
    dependency_group: statsforecast
    planned_adapter: statsforecast_adapter
    implementation_priority: "P0"
    registry_status: registered
    known_constraints:
      - "Point forecasts and prediction intervals are distinct outputs."
      - "A point forecast must not automatically be labeled q_0_5."
      - "Interval bounds must not be presented as native quantiles unless the upstream method defines them that way."
    evaluation_requirements:
      - "Participate in controlled walk-forward validation."
      - "Evaluate nonseasonal and five-trading-day configurations where supported."
      - "Do not assume five-day seasonality improves daily return forecasts."
    notes:
      - "Statistical fitting is part of evaluation and is not treated as authorization for neural training."
  neural_model: &neural_model_entry
    <<: *external_entry
    provider: Nixtla
    category: trained_neural_baselines
    component_type: trained_neural_model
    package_or_repository: neuralforecast
    official_source_urls: *neuralforecast_sources
    license: apache-2.0
    commercial_eligibility: eligible_subject_to_reverification
    execution_mode:
      - local_cpu_requires_benchmark
      - local_gpu
    training_required: true
    zero_shot_supported: false
    point_forecast_supported: true
    probabilistic_output: requires_verification
    native_quantile_support: requires_verification
    multivariate_support: requires_verification
    past_covariate_support: requires_verification
    future_covariate_support: requires_verification
    exogenous_variable_support: requires_verification
    cpu_support: true
    gpu_support: true
    expected_context_constraints:
      - "History, windows, loss, scaling, and architecture-specific requirements require an approved design."
    initial_forecast_horizon: "5_periods_after_training_authorization"
    dependency_group: neuralforecast
    planned_adapter: neuralforecast_adapter
    implementation_priority: "P3"
    registry_status: blocked_pending_authorization
    known_constraints:
      - "Requires fitting or training."
      - "Not part of the Chronos-2 inference smoke test."
      - "Implementation remains blocked while Training is OFF."
    evaluation_requirements:
      - "Require a separately approved training phase and leakage-controlled walk-forward evaluation."
      - "Compare against StatsForecast and approved foundation-model baselines."
    notes:
      - "Registration does not authorize training."
  reconciliation: &reconciliation_entry
    <<: *external_entry
    provider: Nixtla
    category: forecast_reconciliation
    package_or_repository: hierarchicalforecast
    official_source_urls: *hierarchicalforecast_sources
    license: apache-2.0
    commercial_eligibility: eligible_subject_to_reverification
    execution_mode:
      - local_cpu
    training_required: false
    zero_shot_supported: not_applicable
    point_forecast_supported: not_applicable
    probabilistic_output: not_applicable
    native_quantile_support: not_applicable
    multivariate_support: not_applicable
    past_covariate_support: not_applicable
    future_covariate_support: not_applicable
    exogenous_variable_support: not_applicable
    cpu_support: true
    gpu_support: not_applicable
    expected_context_constraints:
      - "Requires normalized base forecasts and a versioned hierarchy."
    initial_forecast_horizon: inherited_from_base_forecast
    dependency_group: hierarchicalforecast
    planned_adapter: hierarchical_forecast_reconciliation_adapter
    implementation_priority: "P3"
    registry_status: deferred
    known_constraints:
      - "This is not a base forecasting model."
      - "It must follow the normalized forecast-adapter layer and must not precede base adapters."
    evaluation_requirements:
      - "Measure coherence error before and after reconciliation."
      - "Preserve and compare base and reconciled forecasts."
    notes:
      - "Basic reconciliation does not authorize model training."
  deferred_specialist: &deferred_specialist_entry
    <<: *external_entry
    provider: Nixtla
    category: deferred_specialists
    package_or_repository: statsforecast
    official_source_urls: *statsforecast_sources
    license: apache-2.0
    commercial_eligibility: eligible_subject_to_reverification
    execution_mode:
      - local_cpu_requires_benchmark
    training_required: false
    zero_shot_supported: not_applicable
    point_forecast_supported: requires_verification
    probabilistic_output: requires_verification
    native_quantile_support: requires_verification
    multivariate_support: requires_verification
    past_covariate_support: requires_verification
    future_covariate_support: requires_verification
    exogenous_variable_support: requires_verification
    cpu_support: true
    gpu_support: not_applicable
    expected_context_constraints:
      - "Use-case-specific history, frequency, and seasonality requirements require verification."
    initial_forecast_horizon: requires_verification
    dependency_group: statsforecast_deferred_specialists
    planned_adapter: deferred_specialist_adapter
    implementation_priority: "P4"
    registry_status: deferred
    known_constraints:
      - "Deferred until foundation, conventional baseline, validation, and benchmark layers are stable."
    evaluation_requirements:
      - "Define a use-case-specific deterministic fixture and walk-forward benchmark before implementation."
    notes:
      - "May later support intraday volume, liquidity, volatility, market-session effects, sparse instruments, or structured scenarios."

canonical_input_contract:
  required_fields:
    - id
    - timestamp
    - target
  optional_fields:
    - past_covariates
    - known_future_covariates
    - static_features
    - hierarchy_fields
    - data_view_identifier
    - source_provider_identifier
  nixtla_mapping:
    id: unique_id
    timestamp: ds
    target: y
  validation_principles:
    - parseable_timestamps
    - ordered_observations_within_each_series
    - unique_id_timestamp_pairs
    - numeric_and_finite_targets
    - no_missing_identifiers
    - sufficient_history_per_candidate
    - no_future_leakage
    - no_artificial_history_padding
    - provenance_retained_for_transformed_data

normalized_forecast_output_contract:
  fields:
    - id
    - timestamp
    - model_id
    - model_version
    - adapter_version
    - point_forecast
    - q_0_1
    - q_0_5
    - q_0_9
    - interval_lower
    - interval_upper
    - interval_level
    - forecast_horizon
    - execution_seconds
    - peak_memory_mb
    - model_cache_size_mb
    - evaluation_window
    - data_view
    - run_id
    - license
    - registry_status
  rules:
    - unsupported_fields_remain_null
    - quantiles_must_never_be_fabricated
    - prediction_intervals_must_not_be_mislabeled_as_quantiles
    - point_forecasts_must_not_automatically_be_treated_as_medians
    - quantile_crossing_must_be_detected_and_reported
    - raw_provider_specific_outputs_remain_available_for_traceability

evaluation_contract:
  point_accuracy:
    - MAE
    - RMSE
    - MASE
    - sMAPE
    - directional_accuracy
  probabilistic_accuracy:
    - pinball_loss
    - median_pinball_loss
    - CRPS_where_supported
    - interval_coverage
    - interval_width
    - quantile_crossing_rate
  operational:
    - inference_time
    - training_time_when_later_authorized
    - peak_memory
    - model_cache_or_download_size
    - CPU_compatibility
    - GPU_requirement
    - failure_rate
    - reproducibility
  governance:
    - license_eligibility
    - source_provenance
    - version_pinning
    - dataset_lineage
    - leakage_protection
    - deterministic_fixture_support
    - model_card_source_verification_date
  advancement_rule: "A candidate must beat or materially complement naive and conventional baselines in controlled walk-forward evaluation before infrastructure or deployment work is considered."

data_views:
  - raw_series
  - anomaly_flagged_series
  - governed_repaired_series

future_reconciliation_fields:
  - base_forecast
  - reconciled_forecast
  - reconciliation_method
  - hierarchy_version
  - coherence_error_before
  - coherence_error_after

hierarchy_examples:
  market_hierarchy:
    - total_market
    - asset_class
    - sector
    - industry
    - symbol
  temporal_hierarchy:
    - monthly
    - weekly
    - daily
    - intraday

implementation_order:
  - "Registry and common contracts"
  - "StatsForecast naive and conventional baselines"
  - "Shared validation and normalized output schema"
  - "Chronos-2 local CPU staging proof of concept"
  - "Walk-forward benchmark harness"
  - "TimesFM 2.5 adapter"
  - "Granite TTM-R3 adapter"
  - "Granite TTM-R2/R2.1 adapter"
  - "Risk, anomaly, volatility, and conformal workflows"
  - "NeuralForecast only after explicit training authorization"
  - "HierarchicalForecast after stable base forecasts exist"
  - "Deferred specialist research"

source_and_license_policy:
  primary_sources:
    - official_model_cards
    - official_repositories
    - official_documentation
    - published_papers
  non_authoritative_sources:
    - search_snippets
    - community_fine_tunes
    - spaces
    - third_party_blogs
  local_research_aids_only:
    - downloaded_offline_html_pages
  prohibited_committed_research_artifacts:
    - downloaded_html
    - downloaded_asset_folders
  requirements:
    - "Reverify licenses from official sources before implementation and before release."
    - "Treat third-party model weights and code as potentially differently licensed."
    - "Obtain legal review where required for commercial distribution."

change_control:
  required_actions:
    - explicit_registry_update
    - official_source_reverification
    - license_review
    - capability_verification
    - benchmark_evidence_for_status_promotion
    - authorization_decision_before_implementation
    - governed_certification_promotion_and_operational_authorization_where_applicable
  code_presence_rule: "A candidate may not move from registered or selected_for_staging_poc to a stronger status solely because its code was added."

